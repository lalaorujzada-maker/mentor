databaseChangeLog:

  - changeSet:
      id: 03-create-second-exam-table
      author: backend-task
      changes:

        - createTable:
            tableName: second_exam
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: result
                  type: INT

              - column:
                  name: pass
                  type: BOOLEAN

        - addForeignKeyConstraint:
            baseTableName: second_exam
            baseColumnNames: student_id
            referencedTableName: student
            referencedColumnNames: id
            constraintName: fk_second_exam_student
            onDelete: CASCADE
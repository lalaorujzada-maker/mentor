databaseChangeLog:

  - changeSet:
      id: 02-create-first-exam-table
      author: backend-task
      changes:

        - createTable:
            tableName: first_exam
            columns:

              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: result
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: pass
                  type: BOOLEAN
                  constraints:
                    nullable: false

              - column:
                  name: second_exam_qr_url
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: first_exam
            baseColumnNames: student_id
            referencedTableName: student
            referencedColumnNames: id
            constraintName: fk_first_exam_student
            onDelete: CASCADE